name: Sync to Hugging Face Spaces

on:
  push:
    branches: [ main ] # Change this to 'master' if your default branch is named master

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HF
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure git with your Hugging Face token embedding it securely into the remote URL
          # Replace 'YOUR_USERNAME' and 'YOUR_SPACE_NAME' with your actual HF details
          git push --force https://YOUR_USERNAME:$HF_TOKEN@huggingface.co/spaces/YOUR_USERNAME/YOUR_SPACE_NAME main
